# Rate limiting zone — 10 requests/second per IP for auth endpoints
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

# --- Redirect HTTP → HTTPS (production only) ---
server {
    listen 80;
    server_name ranktorole.app www.ranktorole.app;

    # Health check accessible over HTTP (for ALB/uptime monitors before SSL)
    location /health/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS server ---
server {
    listen 443 ssl;
    server_name ranktorole.app www.ranktorole.app;

    ssl_certificate     /etc/letsencrypt/live/ranktorole.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ranktorole.app/privkey.pem;

    client_max_body_size 10M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://accounts.google.com; frame-src https://accounts.google.com; img-src 'self' data: https://www.onetcenter.org;" always;

    # Auth endpoints — Nginx rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API routes
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Django admin static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Frontend SPA
    location / {
        root /usr/share/nginx/html/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
